<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invito Speciale 💕</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Fredoka', sans-serif;
        }

        body {
            overflow-x: hidden;
            min-height: 100vh;
            background: linear-gradient(
                135deg,
                #ffe4ef,
                #ffd6f3,
                #fff0f7
            );
        }

        .step {
            display: none;
        }

        .step.active {
            display: flex;
        }

        .floating {
            position: fixed;
            animation: float 15s linear infinite;
            opacity: .35;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            from {
                transform: translateY(110vh) rotate(0deg);
            }
            to {
                transform: translateY(-120vh) rotate(360deg);
            }
        }

        .glass {
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,.75);
        }

        .food-card:hover {
            transform: translateY(-5px) scale(1.03);
        }

        .food-card {
            transition: all .25s ease;
        }

        .cute-shadow {
            box-shadow: 0 10px 30px rgba(255, 105, 180, .2);
        }

        .gif-container img {
            max-width: 280px;
        }
    </style>
</head>

<body class="relative">

    <!-- ELEMENTI DECORATIVI -->
    <div id="decorations"></div>

    <main class="relative z-10 min-h-screen flex items-center justify-center p-6">

        <!-- STEP 1 -->
        <section id="step1"
                 class="step active flex-col items-center justify-center text-center gap-8 max-w-xl w-full">

            <div class="glass cute-shadow rounded-3xl p-8 w-full">

                <h1 class="text-4xl md:text-5xl font-semibold text-pink-600">
                    Vuoi uscire con me?<br>👉👈
                </h1>

                <div class="flex justify-center gap-4 mt-10 flex-wrap">

                    <button id="yesBtn"
                            class="bg-pink-500 hover:bg-pink-600 text-white px-8 py-4 rounded-full text-xl shadow-lg">
                        Sì! 🥰
                    </button>

                    <button id="noBtn"
                            class="bg-gray-300 text-gray-700 px-8 py-4 rounded-full text-xl shadow-lg">
                        No 😢
                    </button>

                </div>
        
                <div class="gif-container mt-6 flex justify-center">
                    <img
                        src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnN3bDVtdzhlODR3Mmg1bzVhNnRsNGJidWdhMWRyNnZ4OThkdmRqYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/q0Fm9D20SCw5q/giphy.gif"
                        alt="Cute Love Gif"
                        class="rounded-3xl shadow-lg">
                </div>

            </div>

        </section>

        <!-- STEP 2 -->
        <section id="step2"
                 class="step flex-col items-center justify-center text-center gap-8 max-w-xl w-full">

            <div class="glass cute-shadow rounded-3xl p-8 w-full">

                <h2 class="text-4xl text-pink-600 mb-8">
                    Quando preferisci andare? 📅
                </h2>

                <input
                    id="dateTime"
                    type="datetime-local"
                    class="w-full p-4 rounded-2xl border-2 border-pink-200 text-lg">

                <button
                    id="continueBtn"
                    class="mt-8 bg-pink-500 hover:bg-pink-600 text-white px-8 py-4 rounded-full text-xl">
                    Continua 🚀
                </button>

            </div>

        </section>

        <!-- STEP 3 -->
        <section id="step3"
                 class="step flex-col items-center justify-center text-center gap-8 max-w-5xl w-full">

            <div class="glass cute-shadow rounded-3xl p-8 w-full">

                <h2 class="text-4xl text-pink-600 mb-8">
                    Dove andiamo a cenare? 🍕
                </h2>

                <div id="foodGrid"
                     class="grid grid-cols-2 md:grid-cols-3 gap-4">

                </div>

            </div>

        </section>

        <!-- STEP 4 -->
        <section id="step4"
                 class="step flex-col items-center justify-center text-center gap-6 max-w-xl w-full">

            <div class="glass cute-shadow rounded-3xl p-8 w-full">

                <h2 class="text-5xl text-pink-600 mb-4">
                    Risposta inviata! 🎉🥳
                </h2>

                <div class="bg-pink-50 rounded-2xl p-5 text-left">

                    <p class="mb-2">
                        <strong>📅 Appuntamento:</strong>
                        <span id="summaryDate"></span>
                    </p>

                    <p>
                        <strong>🍽️ Cucina scelta:</strong>
                        <span id="summaryFood"></span>
                    </p>

                </div>

                <p class="text-2xl text-pink-600 mt-6">
                    ✨Ha detto di SIIIII✨
                </p>

                <div class="gif-container mt-6 flex justify-center">
                    <img
                        src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExaDg5ZjMzbHo0NWdtYWc0bXpndHEzNWxqdTRjeGdpbmwzbnF3ZWdqZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/10Ug6rDDuG3YoU/giphy.gif"
                        alt="Cute Love Gif"
                        class="rounded-3xl shadow-lg">
                </div>

                <p class="text-2xl text-pink-600 mt-6">
                    Ps: Vestiti bene! 👗💕
                </p>

            </div>

        </section>

    </main>

<script>
/* ======================================================
   CONFIG TELEGRAM
====================================================== */

const TELEGRAM_BOT_TOKEN = '8978565055:AAFi5uJ641ZUOei1jgVkOXV3IIUQP-vCfxE';
const TELEGRAM_CHAT_ID = '456381572';

/* ======================================================
   STATO APP
====================================================== */

const appData = {
    dateTime: '',
    food: ''
};

/* ======================================================
   OPZIONI CUCINA
====================================================== */

const foodOptions = [
    { emoji: '🍕', label: 'Pizza' },
    { emoji: '🥢', label: 'Cinese' },
    { emoji: '🌯', label: 'Pita' },
    { emoji: '🍔', label: 'Hamburger' },
    { emoji: '🌮', label: 'Messicano' },
    { emoji: '🍣', label: 'Sushi' },
    { emoji: '🍝', label: 'Italiano' },
    { emoji: '🎁', label: 'Scelgli tu!' }
];

const foodGrid = document.getElementById('foodGrid');

foodOptions.forEach(item => {

    const btn = document.createElement('button');

    btn.className =
        'food-card bg-white rounded-3xl p-5 shadow-lg';

    btn.innerHTML = `
        <div class="text-5xl mb-3">${item.emoji}</div>
        <div class="text-lg font-medium">${item.label}</div>
    `;

    btn.addEventListener('click', () => chooseFood(item.label));

    foodGrid.appendChild(btn);
});

/* ======================================================
   STEP NAVIGATION
====================================================== */

function showStep(id) {

    document
        .querySelectorAll('.step')
        .forEach(step => step.classList.remove('active'));

    document
        .getElementById(id)
        .classList.add('active');
}

/* ======================================================
   STEP 1
====================================================== */

document
    .getElementById('yesBtn')
    .addEventListener('click', () => {
        showStep('step2');
    });

const noBtn = document.getElementById('noBtn');

function moveNoButton() {

    const padding = 20;

    const buttonWidth = noBtn.offsetWidth;
    const buttonHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - buttonWidth - padding;
    const maxY = window.innerHeight - buttonHeight - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = 'fixed';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
    noBtn.style.zIndex = '9999';
}

noBtn.addEventListener('mouseenter', moveNoButton);
noBtn.addEventListener('touchstart', moveNoButton);
noBtn.addEventListener('click', moveNoButton);

/* ======================================================
   STEP 2
====================================================== */

const dateInput = document.getElementById('dateTime');

function setMinDateTime() {

    const now = new Date();

    const offset =
        now.getTimezoneOffset();

    const localDate =
        new Date(now.getTime() - offset * 60000);

    dateInput.min =
        localDate.toISOString().slice(0, 16);
}

setMinDateTime();

document
    .getElementById('continueBtn')
    .addEventListener('click', () => {

        if (!dateInput.value) {
            alert('Seleziona una data e un orario 💕');
            return;
        }

        appData.dateTime = dateInput.value;

        showStep('step3');
    });

/* ======================================================
   STEP 3
====================================================== */

async function chooseFood(food) {

    appData.food = food;

    document.getElementById('summaryDate').textContent =
        formatDate(appData.dateTime);

    document.getElementById('summaryFood').textContent =
        food;

    showStep('step4');

    sendTelegramNotification();
}

/* ======================================================
   TELEGRAM
====================================================== */

async function sendTelegramNotification() {

    const message = `
💕 *NUOVA RISPOSTA RICEVUTA*

📅 *Data e ora:*
${formatDate(appData.dateTime)}

🍽️ *Cucina scelta:*
${appData.food}

🎉 Ha accettato l'invito!
`;

    try {

        const response = await fetch(
            `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }
        );

        const result = await response.json();

        console.log(result);

    } catch (error) {

        console.error(
            'Errore invio Telegram:',
            error
        );
    }
}

/* ======================================================
   FORMAT DATA
====================================================== */

function formatDate(dateString) {

    const date = new Date(dateString);

    return date.toLocaleString('it-IT', {
        dateStyle: 'full',
        timeStyle: 'short'
    });
}

/* ======================================================
   DECORAZIONI SFONDO
====================================================== */

const emojis = [
    '🌸',
    '✨',
    '🎈',
    '🧸',
    '💖',
    '💕'
];

const container =
    document.getElementById('decorations');

for (let i = 0; i < 25; i++) {

    const el = document.createElement('div');

    el.className = 'floating';

    el.textContent =
        emojis[Math.floor(Math.random() * emojis.length)];

    el.style.left =
        Math.random() * 100 + 'vw';

    el.style.fontSize =
        (20 + Math.random() * 25) + 'px';

    el.style.animationDuration =
        (10 + Math.random() * 15) + 's';

    el.style.animationDelay =
        Math.random() * 10 + 's';

    container.appendChild(el);
}
</script>

</body>
</html>
